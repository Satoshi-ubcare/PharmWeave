name: CI / CD

# ┌──────────────────────────────────────────────────────────────────┐
# │  PharmWeave 9-Stage Pipeline                                     │
# │                                                                  │
# │  [품질 게이트]                                                   │
# │  1. quality       — ESLint max-warnings 0 + tsc --noEmit        │
# │  2. test          — 103 tests + prisma migrate deploy            │
# │  3. build         — Vite build + tsc compile                     │
# │                                                                  │
# │  [스테이징 검증 게이트] ← 프로덕션 배포 전 필수 통과            │
# │  4. staging       — Vercel Preview (--no-prod) 배포              │
# │  5. staging-smoke — Preview URL에서 전체 API + 성능 SLO 검증    │
# │  6. e2e           — Playwright E2E (스테이징 URL 대상, 4 spec)  │
# │                                                                  │
# │  [프로덕션 배포]                                                 │
# │  7. deploy        — Vercel Production (e2e 통과 시만)           │
# │  8. smoke-test    — 프로덕션 Smoke Test + SLO + 동시성 검증     │
# │  9. rollback      — Smoke Test 실패 시 vercel rollback 자동 실행│
# └──────────────────────────────────────────────────────────────────┘
#
# ┌──────────────────────────────────────────────────────────────────┐
# │  DB 마이그레이션 롤백 전략                                        │
# │  - 순방향:   prisma migrate deploy (2단계 CI 자동 실행)          │
# │  - 앱 롤백:  8단계 Auto Rollback → vercel rollback 자동 실행    │
# │  - 완전 롤백: git revert HEAD → push → 파이프라인 재실행         │
# │  - 데이터 복구: Neon 콘솔 → Branch → Restore Point 선택         │
# │  ※ 파괴적 마이그레이션(컬럼 삭제) 전 Neon 브랜치 스냅샷 필수   │
# └──────────────────────────────────────────────────────────────────┘

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 동일 브랜치의 이전 실행을 취소하여 리소스 낭비 방지
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════════════
  # 1단계: 코드 품질 게이트
  # ══════════════════════════════════════════════════════════════════
  quality:
    name: "1 · Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate (for type inference)
        run: npx prisma generate --schema=backend/prisma/schema.prisma

      - name: ESLint — Frontend (max-warnings 0)
        run: npm run lint --workspace=frontend

      - name: ESLint — Backend (max-warnings 0)
        run: npm run lint --workspace=backend

      - name: TypeScript type check — Frontend
        run: npm run type-check --workspace=frontend

      - name: TypeScript type check — Backend
        run: npm run type-check --workspace=backend

      - name: Job summary
        if: always()
        run: |
          echo "## 1 · Lint & Type Check" >> $GITHUB_STEP_SUMMARY
          echo "| 검사 항목 | 결과 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint Frontend (max-warnings 0) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint Backend  (max-warnings 0) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| tsc --noEmit Frontend | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| tsc --noEmit Backend  | ✅ |" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════════
  # 2단계: 테스트 + DB 마이그레이션 검증
  # ══════════════════════════════════════════════════════════════════
  test:
    name: "2 · Tests + Migration"
    runs-on: ubuntu-latest
    needs: quality

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/pharmweave_test
      NODE_ENV: test
      JWT_SECRET: test-secret-key-for-ci-minimum-32-chars

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: pharmweave_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate --schema=backend/prisma/schema.prisma

      - name: "DB migration 검증 — prisma migrate deploy"
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/pharmweave_test

      - name: "Frontend tests — Zustand store (20 tests)"
        run: npm run test --workspace=frontend

      - name: "Backend unit tests — Domain Layer (22 tests)"
        run: npm run test:unit --workspace=backend

      - name: "Backend all tests + Coverage (103 tests)"
        run: npm run test:all --workspace=backend -- --coverage --coverageReporters=text-summary --coverageReporters=lcov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/

      - name: Job summary
        if: always()
        run: |
          echo "## 2 · Tests + Migration" >> $GITHUB_STEP_SUMMARY
          echo "| 검사 항목 | 내용 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| DB Migration | prisma migrate deploy → PostgreSQL 15 컨테이너 |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | Zustand store 단위 테스트 (20 tests) |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Unit | Domain Layer 순수 로직 (22 tests) |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Integration | HTTP API 계약 검증 (61 tests) |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Service | PluginService 단위 (8 tests) |" >> $GITHUB_STEP_SUMMARY
          echo "| **합계** | **103 tests PASS** |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | 98%+ · backend/coverage/ 아티팩트 업로드 |" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════════
  # 3단계: 빌드 검증
  # ══════════════════════════════════════════════════════════════════
  build:
    name: "3 · Build Validation"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate --schema=backend/prisma/schema.prisma

      - name: "Frontend build — Vite (React → dist/)"
        run: npm run build --workspace=frontend
        env:
          VITE_API_BASE_URL: https://pharm-weave-frontend.vercel.app/api

      - name: "Backend build — TypeScript (src/ → dist/)"
        run: npm run build --workspace=backend

      - name: Job summary
        if: always()
        run: |
          echo "## 3 · Build Validation" >> $GITHUB_STEP_SUMMARY
          echo "| 빌드 대상 | 도구 | 출력 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | Vite 5 | frontend/dist/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | tsc 5  | backend/dist/  |" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════════
  # 4단계: 스테이징 배포 (Vercel Preview — --prod 없음)
  #
  # 목적: 프로덕션 배포 전, 실제 서버리스 환경에서 빌드 결과물이
  #       정상 동작하는지 격리된 Preview URL에서 먼저 검증한다.
  #       Preview는 프로덕션과 동일한 런타임·환경변수를 사용하나
  #       별도 URL로 격리되어 사용자에게 영향 없음.
  # ══════════════════════════════════════════════════════════════════
  staging:
    name: "4 · Staging Deploy (Preview)"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      preview-url: ${{ steps.staging-deploy.outputs.preview-url }}

    steps:
      - uses: actions/checkout@v4

      - name: "Vercel Preview 배포 (--prod 없음 → 스테이징 URL)"
        id: staging-deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # --prod 플래그 없음 → Vercel Preview 배포 (프로덕션 격리)

      - name: Job summary
        if: always()
        run: |
          PREVIEW_URL="${{ steps.staging-deploy.outputs.preview-url }}"
          echo "## 4 · Staging Deploy (Preview)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 배포 유형 | Vercel Preview (프로덕션 격리) |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview URL | $PREVIEW_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| 다음 단계 | 5단계: Preview URL에서 Smoke Test 실행 |" >> $GITHUB_STEP_SUMMARY
          echo "| 프로덕션 배포 | 5단계 통과 시에만 실행 |" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════════
  # 5단계: 스테이징 Smoke Test (Preview URL 검증)
  #
  # 목적: 프로덕션 배포 전 마지막 방어선.
  #       실제 Vercel 서버리스 런타임에서 API가 정상 응답하는지,
  #       DB 연결이 유효한지, 응답 시간 SLO를 충족하는지 검증.
  #       이 단계 실패 시 → 프로덕션 배포(6단계) 자동 차단.
  # ══════════════════════════════════════════════════════════════════
  staging-smoke:
    name: "5 · Staging Smoke Test"
    runs-on: ubuntu-latest
    needs: staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      STAGING_URL: ${{ needs.staging.outputs.preview-url }}
      RESPONSE_TIME_SLO: 3000
      # Vercel Preview 배포 보호 우회 토큰
      # Vercel 대시보드 > Project Settings > Deployment Protection > Protection Bypass for Automation
      BYPASS_TOKEN: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

    steps:
      - name: Wait for staging cold start
        run: sleep 15

      # ── 5-1: 스테이징 헬스 체크 ─────────────────────────────
      - name: "스테이징 헬스 체크 — GET /api/health"
        run: |
          echo "🔍 스테이징 URL: $STAGING_URL"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "x-vercel-protection-bypass: $BYPASS_TOKEN" \
              "$STAGING_URL/api/health")
            BODY=$(curl -s \
              -H "x-vercel-protection-bypass: $BYPASS_TOKEN" \
              "$STAGING_URL/api/health")
            echo "Attempt $i: HTTP $STATUS — $BODY"
            if [ "$STATUS" = "200" ] && echo "$BODY" | grep -q '"status":"ok"'; then
              echo "✅ 스테이징 /api/health OK"
              exit 0
            fi
            sleep 10
          done
          echo "❌ 스테이징 헬스 체크 실패 → 프로덕션 배포 차단"
          exit 1

      # ── 5-2: 스테이징 DB 연결 + 인증 플로우 검증 ──────────
      - name: "스테이징 인증 플로우 — POST /api/auth/register"
        id: staging-auth
        run: |
          SMOKE_USER="staging_${GITHUB_RUN_ID}"
          SMOKE_PASS="StagingPass_${GITHUB_RUN_ID}!"

          REG_RESP=$(curl -s -w "\n%{http_code}" \
            -X POST "$STAGING_URL/api/auth/register" \
            -H "Content-Type: application/json" \
            -H "x-vercel-protection-bypass: $BYPASS_TOKEN" \
            -d "{\"username\":\"$SMOKE_USER\",\"password\":\"$SMOKE_PASS\"}")
          REG_STATUS=$(echo "$REG_RESP" | tail -1)
          REG_BODY=$(echo "$REG_RESP" | head -1)
          echo "POST /api/auth/register: HTTP $REG_STATUS"

          if [ "$REG_STATUS" = "201" ] || [ "$REG_STATUS" = "409" ]; then
            if [ "$REG_STATUS" = "201" ]; then
              TOKEN=$(echo "$REG_BODY" | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
            else
              # 409: 이미 존재 → 로그인
              LOGIN_BODY=$(curl -s -X POST "$STAGING_URL/api/auth/login" \
                -H "Content-Type: application/json" \
                -H "x-vercel-protection-bypass: $BYPASS_TOKEN" \
                -d "{\"username\":\"$SMOKE_USER\",\"password\":\"$SMOKE_PASS\"}")
              TOKEN=$(echo "$LOGIN_BODY" | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
            fi
            echo "✅ 스테이징 DB 연결 확인 (인증 성공)"
            echo "STAGING_TOKEN=$TOKEN" >> $GITHUB_ENV
          else
            echo "❌ 스테이징 DB 연결 실패: HTTP $REG_STATUS"
            exit 1
          fi

      # ── 5-3: 스테이징 API 전체 검증 ────────────────────────
      - name: "스테이징 API 검증 — drugs · plugins · visits"
        run: |
          check_api() {
            local label=$1; local url=$2; local expected=$3
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $STAGING_TOKEN" \
              -H "x-vercel-protection-bypass: $BYPASS_TOKEN" \
              "$url")
            if [ "$STATUS" = "$expected" ]; then
              echo "✅ $label: HTTP $STATUS"
            else
              echo "❌ $label: HTTP $STATUS (expected $expected)"
              exit 1
            fi
          }

          check_api "GET /api/drugs"        "$STAGING_URL/api/drugs?q=test"   "200"
          check_api "GET /api/plugins"      "$STAGING_URL/api/plugins"         "200"
          check_api "GET /api/visits/today" "$STAGING_URL/api/visits/today"    "200"

      # ── 5-4: 스테이징 응답 시간 SLO 검증 ──────────────────
      - name: "스테이징 응답 시간 SLO < ${RESPONSE_TIME_SLO}ms"
        run: |
          FAILED=0

          measure() {
            local label=$1; local url=$2
            TIME_MS=$(curl -s -o /dev/null -w "%{time_total}" \
              -H "Authorization: Bearer $STAGING_TOKEN" \
              -H "x-vercel-protection-bypass: $BYPASS_TOKEN" \
              "$url" \
              | awk '{printf "%d", $1 * 1000}')
            echo "$label: ${TIME_MS}ms"
            if [ "$TIME_MS" -gt "$RESPONSE_TIME_SLO" ]; then
              echo "⚠️  SLO 초과: $label ${TIME_MS}ms > ${RESPONSE_TIME_SLO}ms"
              FAILED=1
            fi
          }

          measure "GET /api/health"  "$STAGING_URL/api/health"
          measure "GET /api/drugs"   "$STAGING_URL/api/drugs?q=test"
          measure "GET /api/plugins" "$STAGING_URL/api/plugins"

          [ "$FAILED" = "0" ] && echo "✅ 스테이징 SLO 전 항목 통과" || exit 1

      - name: Job summary
        if: always()
        run: |
          echo "## 5 · Staging Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**검증 대상:** $STAGING_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 검증 항목 | 내용 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 헬스 체크 | GET /api/health → 200 + body 검증 |" >> $GITHUB_STEP_SUMMARY
          echo "| DB 연결 | POST /api/auth/register → JWT 발급 확인 |" >> $GITHUB_STEP_SUMMARY
          echo "| API 검증 | GET /api/drugs, /api/plugins, /api/visits/today |" >> $GITHUB_STEP_SUMMARY
          echo "| 응답 시간 | health·drugs·plugins < ${RESPONSE_TIME_SLO}ms |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ **스테이징 검증 통과 → 6단계 프로덕션 배포 진행**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **스테이징 검증 실패 → 프로덕션 배포 차단됨**" >> $GITHUB_STEP_SUMMARY
          fi

  # ══════════════════════════════════════════════════════════════════
  # 6단계: E2E 테스트 (Playwright — 스테이징 URL 대상)
  #
  # 목적: 실제 브라우저(Chromium)로 스테이징 환경의 UI·API 통합 동작을
  #       검증한다. 4개 스펙(smoke, api, reception, workflow-navigation)이
  #       모두 통과해야 프로덕션 배포가 허용된다.
  # ══════════════════════════════════════════════════════════════════
  e2e:
    name: "6 · E2E Tests (Playwright)"
    runs-on: ubuntu-latest
    needs: [staging-smoke, staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: "E2E 테스트 — Playwright (스테이징 URL 대상)"
        run: npm run test:e2e --workspace=frontend
        env:
          CI: true
          BASE_URL: ${{ needs.staging.outputs.preview-url }}
          # Vercel Preview 배포 보호 우회 (playwright.config.ts의 extraHTTPHeaders에서 사용)
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Job summary
        if: always()
        run: |
          echo "## 6 · E2E Tests (Playwright)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**검증 대상:** ${{ needs.staging.outputs.preview-url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 스펙 파일 | 내용 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| smoke.spec.ts | 페이지 로딩, 헤더, Stepper 6단계, 다크모드 |" >> $GITHUB_STEP_SUMMARY
          echo "| api.spec.ts | /api/health, 인증, /api/drugs HTTP 계약 |" >> $GITHUB_STEP_SUMMARY
          echo "| reception.spec.ts | 접수 화면 UI, 환자 검색 폼 |" >> $GITHUB_STEP_SUMMARY
          echo "| workflow-navigation.spec.ts | 6단계 페이지 네비게이션 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 리포트 아티팩트: \`playwright-report\` (7일 보관)" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════════
  # 7단계: 프로덕션 배포 (E2E + 스테이징 통과 후에만)
  # ══════════════════════════════════════════════════════════════════
  deploy:
    name: "7 · Deploy to Production"
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: "Vercel Production 배포 (--prod)"
        id: prod-deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod

      - name: Job summary
        if: always()
        run: |
          echo "## 7 · Deploy to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 배포 URL | https://pharm-weave-frontend.vercel.app |" >> $GITHUB_STEP_SUMMARY
          echo "| 전제 조건 | 1~6단계 전부 통과 (품질·테스트·빌드·스테이징·SmokeTest·E2E) |" >> $GITHUB_STEP_SUMMARY
          echo "| 트리거 | main 브랜치 push만 실행 |" >> $GITHUB_STEP_SUMMARY
          echo "| 커밋 | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════════
  # 8단계: 프로덕션 Smoke Test + 성능 SLO + 동시성
  # ══════════════════════════════════════════════════════════════════
  smoke-test:
    name: "8 · Production Smoke Test & SLO"
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      BASE_URL: https://pharm-weave-frontend.vercel.app
      RESPONSE_TIME_SLO: 3000

    steps:
      - name: Wait for production cold start
        run: sleep 20

      # ── 7-1: 프로덕션 헬스 체크 (재시도 3회) ───────────────
      - name: "프로덕션 헬스 체크 — GET /api/health"
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/health")
            BODY=$(curl -s "$BASE_URL/api/health")
            echo "Attempt $i: HTTP $STATUS — $BODY"
            if [ "$STATUS" = "200" ] && echo "$BODY" | grep -q '"status":"ok"'; then
              echo "✅ /api/health OK (body verified)"
              exit 0
            fi
            sleep 15
          done
          echo "❌ /api/health failed after 3 attempts"
          exit 1

      # ── 7-2: 프로덕션 인증 플로우 검증 ─────────────────────
      - name: "프로덕션 인증 플로우 — POST /api/auth/register + login"
        run: |
          SMOKE_USER="prod_smoke_${GITHUB_RUN_ID}"
          SMOKE_PASS="ProdSmoke_${GITHUB_RUN_ID}!"

          REG_RESP=$(curl -s -w "\n%{http_code}" \
            -X POST "$BASE_URL/api/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$SMOKE_USER\",\"password\":\"$SMOKE_PASS\"}")
          REG_STATUS=$(echo "$REG_RESP" | tail -1)
          REG_BODY=$(echo "$REG_RESP" | head -1)

          if [ "$REG_STATUS" = "201" ]; then
            TOKEN=$(echo "$REG_BODY" | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
            echo "✅ 프로덕션 DB 연결 확인 (회원가입 성공)"
          elif [ "$REG_STATUS" = "409" ]; then
            LOGIN_BODY=$(curl -s -X POST "$BASE_URL/api/auth/login" \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"$SMOKE_USER\",\"password\":\"$SMOKE_PASS\"}")
            TOKEN=$(echo "$LOGIN_BODY" | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
            echo "✅ 프로덕션 DB 연결 확인 (로그인 성공)"
          else
            echo "❌ 프로덕션 인증 실패: HTTP $REG_STATUS"
            exit 1
          fi
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      # ── 7-3: 프로덕션 API 전체 검증 ────────────────────────
      - name: "프로덕션 API 검증 — drugs · plugins · visits"
        run: |
          check_api() {
            local label=$1; local url=$2
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" "$url")
            if [ "$STATUS" = "200" ]; then
              echo "✅ $label OK"
            else
              echo "❌ $label: HTTP $STATUS"
              exit 1
            fi
          }
          check_api "GET /api/drugs"        "$BASE_URL/api/drugs?q=test"
          check_api "GET /api/plugins"      "$BASE_URL/api/plugins"
          check_api "GET /api/visits/today" "$BASE_URL/api/visits/today"

      # ── 7-4: 응답 시간 SLO 검증 ────────────────────────────
      - name: "응답 시간 SLO < ${RESPONSE_TIME_SLO}ms"
        run: |
          FAILED=0
          measure() {
            local label=$1; local url=$2
            TIME_MS=$(curl -s -o /dev/null -w "%{time_total}" \
              -H "Authorization: Bearer $TOKEN" "$url" \
              | awk '{printf "%d", $1 * 1000}')
            echo "$label: ${TIME_MS}ms (SLO: ${RESPONSE_TIME_SLO}ms)"
            if [ "$TIME_MS" -gt "$RESPONSE_TIME_SLO" ]; then
              echo "⚠️  SLO 초과: $label"
              FAILED=1
            else
              echo "✅ SLO 통과: $label"
            fi
          }
          measure "GET /api/health"  "$BASE_URL/api/health"
          measure "GET /api/drugs"   "$BASE_URL/api/drugs?q=test"
          measure "GET /api/plugins" "$BASE_URL/api/plugins"

          [ "$FAILED" = "0" ] && echo "✅ 모든 엔드포인트 SLO 통과" || exit 1

      # ── 7-5: 동시성 테스트 (10 concurrent) ─────────────────
      - name: "동시성 테스트 — /api/health × 10 concurrent requests"
        run: |
          SUCCESS=0; TOTAL=10
          for i in $(seq 1 $TOTAL); do
            (
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 5 "$BASE_URL/api/health")
              echo "${STATUS}" > /tmp/conc_${i}
            ) &
          done
          wait

          for i in $(seq 1 $TOTAL); do
            [ "$(cat /tmp/conc_${i} 2>/dev/null)" = "200" ] && SUCCESS=$((SUCCESS+1))
            rm -f /tmp/conc_${i}
          done

          echo "동시 요청 결과: $SUCCESS/$TOTAL 성공"
          THRESHOLD=$((TOTAL * 80 / 100))
          if [ "$SUCCESS" -lt "$THRESHOLD" ]; then
            echo "❌ 동시성 임계값 미달: $SUCCESS/$TOTAL (min: $THRESHOLD)"
            exit 1
          fi
          echo "✅ 동시성 테스트 통과: $SUCCESS/$TOTAL"

      - name: Job summary
        if: always()
        run: |
          echo "## 8 · Production Smoke Test & SLO" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**검증 대상:** $BASE_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 검증 항목 | 기준 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 헬스 체크 | GET /api/health → 200 + body 검증 (재시도 3회) |" >> $GITHUB_STEP_SUMMARY
          echo "| DB 연결 | POST /api/auth/register → JWT 발급 |" >> $GITHUB_STEP_SUMMARY
          echo "| API 검증 | drugs · plugins · visits/today |" >> $GITHUB_STEP_SUMMARY
          echo "| 응답 시간 SLO | health·drugs·plugins < 3,000ms |" >> $GITHUB_STEP_SUMMARY
          echo "| 동시성 | 10 concurrent requests → 80%+ 성공 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 자동 롤백" >> $GITHUB_STEP_SUMMARY
          echo "이 단계 실패 시 **9단계 Auto Rollback**이 자동 실행됩니다." >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════════
  # 9단계: 자동 롤백 (프로덕션 Smoke Test 실패 시)
  #
  # 트리거: 8단계 실패 시 자동 실행
  # 동작: vercel rollback → 이전 프로덕션 배포로 즉시 복구
  # ══════════════════════════════════════════════════════════════════
  rollback:
    name: "9 · Auto Rollback"
    runs-on: ubuntu-latest
    needs: smoke-test
    if: |
      always() &&
      needs.smoke-test.result == 'failure' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: "자동 롤백 — vercel rollback 실행"
        id: rollback-step
        run: |
          echo "🚨 프로덕션 Smoke Test 실패 감지"
          echo "커밋: ${{ github.sha }}"
          echo "실행: #${{ github.run_number }}"
          echo ""
          echo "🔄 vercel rollback 시작 — 이전 프로덕션 배포로 복구 중..."

          vercel rollback \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --yes \
            2>&1 | tee /tmp/rollback-output.txt

          ROLLBACK_EXIT=${PIPESTATUS[0]}
          if [ $ROLLBACK_EXIT -eq 0 ]; then
            echo "ROLLBACK_STATUS=success" >> $GITHUB_ENV
            echo "✅ 롤백 명령 성공"
          else
            echo "ROLLBACK_STATUS=failed" >> $GITHUB_ENV
            echo "❌ 롤백 명령 실패"
          fi

      - name: "롤백 후 프로덕션 헬스 체크"
        run: |
          echo "⏳ 롤백 배포 안정화 대기 (15초)..."
          sleep 15

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pharm-weave-frontend.vercel.app/api/health")
          BODY=$(curl -s "https://pharm-weave-frontend.vercel.app/api/health")
          echo "롤백 후 /api/health: HTTP $STATUS — $BODY"

          if [ "$STATUS" = "200" ]; then
            echo "✅ 롤백 후 프로덕션 정상 확인"
            echo "HEALTH_AFTER_ROLLBACK=ok" >> $GITHUB_ENV
          else
            echo "❌ 롤백 후에도 서비스 비정상 — 즉시 수동 확인 필요"
            echo "HEALTH_AFTER_ROLLBACK=fail" >> $GITHUB_ENV
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## 9 · Auto Rollback" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**트리거:** 7단계 프로덕션 Smoke Test 실패" >> $GITHUB_STEP_SUMMARY
          echo "**실패 커밋:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 단계 | 결과 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          if [ "$ROLLBACK_STATUS" = "success" ]; then
            echo "| vercel rollback 실행 | ✅ 성공 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| vercel rollback 실행 | ❌ 실패 |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$HEALTH_AFTER_ROLLBACK" = "ok" ]; then
            echo "| 롤백 후 헬스 체크 | ✅ 서비스 정상 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 롤백 후 헬스 체크 | ❌ 수동 확인 필요 |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 수동 개입 절차 (자동 롤백 실패 시)" >> $GITHUB_STEP_SUMMARY
          echo "1. **Vercel 대시보드**: Deployments → 직전 성공 배포 → Promote to Production" >> $GITHUB_STEP_SUMMARY
          echo "2. **CLI**: \`vercel rollback --token \$VERCEL_TOKEN\`" >> $GITHUB_STEP_SUMMARY
          echo "3. **Git revert**: \`git revert ${{ github.sha }} && git push\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### DB 마이그레이션 롤백" >> $GITHUB_STEP_SUMMARY
          echo "- **스키마 변경 없는 경우**: Vercel 롤백만으로 충분" >> $GITHUB_STEP_SUMMARY
          echo "- **스키마 변경 포함 시**: Neon 콘솔 → Branch → Restore Point 선택" >> $GITHUB_STEP_SUMMARY
          echo "- **예방**: 파괴적 마이그레이션 전 Neon 브랜치 스냅샷 생성" >> $GITHUB_STEP_SUMMARY
