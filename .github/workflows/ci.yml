name: CI / CD

# ┌─────────────────────────────────────────────────────────────┐
# │  PharmWeave 4-Stage Pipeline                                │
# │  1. quality  — ESLint + TypeScript strict                   │
# │  2. test     — Unit (22) + Integration (23) + Migration     │
# │  3. build    — Vite build + tsc compile                     │
# │  4. deploy   — Vercel Production (main push only)           │
# └─────────────────────────────────────────────────────────────┘

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:          # 수동 실행 지원 (평가·데모용)

jobs:
  # ─── 1단계: 코드 품질 ─────────────────────────────────────
  quality:
    name: "1 · Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate (for type inference)
        run: npx prisma generate --schema=backend/prisma/schema.prisma

      - name: ESLint — Frontend
        run: npm run lint --workspace=frontend

      - name: ESLint — Backend
        run: npm run lint --workspace=backend

      - name: TypeScript type check — Frontend
        run: npm run type-check --workspace=frontend

      - name: TypeScript type check — Backend
        run: npm run type-check --workspace=backend

      - name: Job summary
        if: always()
        run: |
          echo "## 1 · Lint & Type Check" >> $GITHUB_STEP_SUMMARY
          echo "| 검사 항목 | 결과 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint Frontend (max-warnings 0) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint Backend  (max-warnings 0) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| tsc --noEmit Frontend | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| tsc --noEmit Backend  | ✅ |" >> $GITHUB_STEP_SUMMARY

  # ─── 2단계: 테스트 + DB 마이그레이션 검증 ─────────────────
  test:
    name: "2 · Tests + Migration"
    runs-on: ubuntu-latest
    needs: quality

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/pharmweave_test
      NODE_ENV: test
      JWT_SECRET: test-secret-key-for-ci-minimum-32-chars

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: pharmweave_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate --schema=backend/prisma/schema.prisma

      - name: "DB migration 검증 — prisma migrate deploy (PostgreSQL 컨테이너)"
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/pharmweave_test

      - name: "Unit tests — Domain Layer (WorkflowStateMachine · CopayCalculator · ClaimDataBuilder)"
        run: npm run test:unit --workspace=backend -- --coverage --coverageReporters=text-summary

      - name: "Integration tests — API Layer (auth 6 · patients 8 · visits 9, Prisma mocked)"
        run: npm run test:integration --workspace=backend

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/

      - name: Job summary
        if: always()
        run: |
          echo "## 2 · Tests + Migration" >> $GITHUB_STEP_SUMMARY
          echo "| 검사 항목 | 내용 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| DB Migration | prisma migrate deploy → PostgreSQL 15 컨테이너 |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | Domain Layer 순수 로직 (22 tests) |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | HTTP API 계약 검증 · Prisma mocked (23 tests) |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | backend/coverage/ 아티팩트 업로드 |" >> $GITHUB_STEP_SUMMARY

  # ─── 3단계: 빌드 검증 ─────────────────────────────────────
  build:
    name: "3 · Build Validation"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate --schema=backend/prisma/schema.prisma

      - name: "Frontend build — Vite (React → dist/)"
        run: npm run build --workspace=frontend
        env:
          VITE_API_BASE_URL: https://pharm-weave-frontend.vercel.app/api

      - name: "Backend build — TypeScript (src/ → dist/)"
        run: npm run build --workspace=backend

      - name: Job summary
        if: always()
        run: |
          echo "## 3 · Build Validation" >> $GITHUB_STEP_SUMMARY
          echo "| 빌드 대상 | 도구 | 출력 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | Vite 5 | frontend/dist/ |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | tsc 5  | backend/dist/  |" >> $GITHUB_STEP_SUMMARY

  # ─── 4단계: Vercel 배포 (main push만) ─────────────────────
  deploy:
    name: "4 · Deploy to Vercel"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod

      - name: Job summary
        if: always()
        run: |
          echo "## 4 · Deploy to Vercel" >> $GITHUB_STEP_SUMMARY
          echo "- 배포 대상: https://pharm-weave-frontend.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "- 트리거: main 브랜치 push" >> $GITHUB_STEP_SUMMARY
          echo "- 전제 조건: 1·2·3단계 모두 통과 시에만 실행" >> $GITHUB_STEP_SUMMARY
